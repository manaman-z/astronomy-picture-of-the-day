<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./src/output.css" rel="stylesheet">
    <link rel="icon" href="./img/logo-dark.png" type="icon">
    <title>Astronomy Picture of the Day</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Intel+One+Mono:wght@300&display=swap" rel="stylesheet">
</head>

<body
    class="bg-deep text-vanilla dark:bg-vanilla dark:text-deep transition-colors duration-800 selection:bg-vanilla selection:text-deep dark:selection:bg-deep dark:selection:text-vanilla">

    <header
        class="fixed inset-x-0 top-0 z-50 flex h-16 items-center justify-between border-b border-current bg-deep dark:bg-vanilla transition-colors duration-800 px-4">
        <div class="flex h-full min-w-0 items-center gap-3 sm:gap-4">
            <img class="h-8 w-8 sm:h-10 sm:w-10 object-contain block dark:hidden" src="./img/logo-dark.png" alt="Logo">
            <img class="h-8 w-8 sm:h-10 sm:w-10 object-contain hidden dark:block" src="./img/logo.png" alt="Logo">

            <h1
                class="h-full flex items-center truncate text-lg tracking-wide sm:text-xl md:text-2xl lg:text-3xl after:content-['a.p.o.t.d'] sm:after:content-['astronomy_picture_of_the_day']">
            </h1>
        </div>

        <button id="toggleTheme"
            class="h-full px-4 text-lg tracking-wide sm:text-xl md:text-2xl lg:text-3xl hover:cursor-pointer hover:bg-vanilla hover:text-deep dark:hover:bg-deep dark:hover:text-vanilla after:content-['dark!.'] dark:after:content-['light!'] transition-colors duration-800">
        </button>
    </header>

    <main class="pt-20 px-4 pb-8 flex flex-col lg:flex-row gap-8 h-screen max-w-7xl mx-auto w-full">

        <div
            class="w-full lg:w-1/2 h-[50vh] sm:h-[60vh] lg:h-[calc(100vh-8rem)] lg:sticky lg:top-24 flex items-center justify-center bg-vanilla/5 dark:bg-deep/5 rounded-lg overflow-hidden">
            <a id="link-to-hd" href="" class="w-full h-full block">
                <img id="img" alt="Loading NASA APOD..."
                    class="w-full h-full object-cover opacity-0 transition-opacity duration-500">
            </a>
        </div>

        <div class="w-full lg:w-1/2 flex flex-col lg:h-[calc(100vh-8rem)] lg:sticky lg:top-24 py-2">
            <h1 id="title" class="text-2xl font-bold mb-2 md:text-3xl lg:text-4xl tracking-tight"></h1>
            <h2 id="date-copyright" class="text-sm opacity-75 mb-6 border-b border-current/20 pb-2"></h2>

            <div
                class="overflow-y-auto pr-3 max-h-64 lg:max-h-none lg:flex-1 [scrollbar-width:thin] [scrollbar-color:currentColor_transparent]">
                <p id="explanation"
                    class="leading-relaxed text-base md:text-lg text-justify opacity-90 whitespace-pre-line"></p>
            </div>
        </div>

    </main>

    <footer class="mt-auto border-t border-current bg-deep dark:bg-vanilla transition-colors duration-800 px-4 py-8">
        <div class="max-w-7xl mx-auto flex flex-col gap-6 text-sm md:text-base opacity-80">
            <div class="space-y-2 max-w-2xl">
                <p>Each day a different image or photograph of our fascinating universe is featured, along with a brief
                    explanation written by a professional astronomer.</p>
                <p>This website was created by using open NASA APOD API.</p>
                <p>Created by manaman-z. May 2026.</p>
            </div>

            <div class="flex flex-col sm:flex-row sm:flex-wrap gap-x-6 gap-y-2 pt-4 border-t border-current/10">
                <a class="underline decoration-dotted hover:bg-vanilla hover:text-deep dark:hover:bg-deep dark:hover:text-vanilla px-1 rounded transition-colors"
                    href="https://nasa.gov" target="_blank" rel="noopener">nasa.gov</a>
                <a class="underline decoration-dotted hover:bg-vanilla hover:text-deep dark:hover:bg-deep dark:hover:text-vanilla px-1 rounded transition-colors"
                    href="https://api.nasa.gov/" target="_blank" rel="noopener">api.nasa.gov</a>
                <a class="underline decoration-dotted hover:bg-vanilla hover:text-deep dark:hover:bg-deep dark:hover:text-vanilla px-1 rounded transition-colors"
                    href="https://github.com/nasa" target="_blank" rel="noopener">github.com/nasa</a>
                <a class="underline decoration-dotted hover:bg-vanilla hover:text-deep dark:hover:bg-deep dark:hover:text-vanilla px-1 rounded transition-colors"
                    href="https://github.com/manaman-z" target="_blank" rel="noopener">github.com/manaman-z</a>
            </div>
        </div>
    </footer>


    <script>
        const btn = document.getElementById('toggleTheme');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
        btn.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        const key = "__NASA_API_KEY_PLACEHOLDER__";
        const url = `https://api.nasa.gov/planetary/apod?api_key=`;

        const img = document.querySelector("#img");
        const linkToHD = document.querySelector("#link-to-hd");
        const explanation = document.querySelector("#explanation");
        const dateCopyright = document.querySelector("#date-copyright");
        const title = document.querySelector("#title");

        function fetchData() {
            fetch(url + key)
                .then(response => {
                    if (!response.ok) throw new Error('Network error');
                    return response.json();
                })
                .then(json => {
                    console.log(json);

                    const copyrightText = json.copyright ? ` © ${json.copyright}` : '';
                    dateCopyright.textContent = `${json.date}${copyrightText}`;
                    explanation.textContent = json.explanation;
                    title.textContent = json.title;

                    if (json.media_type === 'video') {
                        const iframe = document.createElement('iframe');
                        iframe.src = json.url;
                        iframe.className = "w-full h-full rounded-lg min-h-[300px]";
                        linkToHD.replaceWith(iframe);
                    } else {
                        img.onload = function () {
                            img.classList.remove('opacity-0');
                            img.classList.add('opacity-100');
                        };
                        img.setAttribute("src", json.url);
                        linkToHD.setAttribute("href", json.hdurl || json.url);
                    }

                })
                .catch(error => {
                    console.error('Could not get data:', error);
                    title.textContent = "Could not get data :(";
                });
        }
        fetchData();
    </script>
</body>

</html>
